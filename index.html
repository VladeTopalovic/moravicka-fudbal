<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaučosi - Comet Live</title>
    <style>
        :root { --bg: #0d1b2a; --card: #1b263b; --accent: #415a77; --gold: #e0e1dd; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: white; }
        .header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); }
        .tab-container { display: flex; background: var(--card); }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; opacity: 0.5; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--gold); }
        .container { padding: 15px; }
        .match { background: var(--card); margin-bottom: 10px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .gaucosi-row { background: rgba(224, 225, 221, 0.2) !important; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; }
        th { background: var(--accent); padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid var(--bg); }
    </style>
</head>
<body>
    <div class="header">COMET LIVE WEB</div>
    <div class="tab-container">
        <div class="tab active" onclick="prikazi('rez')">REZULTATI</div>
        <div class="tab" onclick="prikazi('tab')">TABELA</div>
    </div>
    <div id="content" class="container">Učitavanje...</div>

    <script>
        let sveznji = { rezultati: [], tabela: [] };
        async function osvezi() {
            try {
                const r = await fetch('podaci.json?t=' + Date.now());
                sveznji = await r.json();
                prikazi('rez');
            } catch (e) { document.getElementById('content').innerHTML = "Ažuriranje u toku..."; }
        }
        function prikazi(tip) {
            const c = document.getElementById('content');
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tip==='rez' && i===0) || (tip==='tab' && i===1)));
            if(tip === 'rez') {
                c.innerHTML = sveznji.rezultati.map(m => `<div class="match"><span>${m.domacin}</span><b style="color:var(--gold)">${m.rezultat}</b><span>${m.gost}</span></div>`).join('') || "Nema novih rezultata.";
            } else {
                let h = '<table><tr><th>#</th><th>Klub</th><th>B</th></tr>';
                sveznji.tabela.forEach(k => {
                    let isGauco = k.klub.includes("Gauč") ? 'class="gaucosi-row"' : '';
                    h += `<tr ${isGauco}><td>${k.poz || k.pozicija}</td><td>${k.klub}</td><td>${k.bod || k.bodovi}</td></tr>`;
                });
                c.innerHTML = h + '</table>';
            }
        }
        osvezi();
    </script>
</body>
</html>
